version: "3.9"

services:
  backend:
    build: .
    container_name: toutiao_backend
    restart: always

    ports:
      - "8000:8000"

    volumes:
      - .:/app

    env_file:
      - .env

    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started

    command: >
      sh -c "uvicorn main:app --host 0.0.0.0 --port 8000"

  mysql:
    image: mysql:8.0
    container_name: toutiao_mysql
    restart: always

    ports:
      - "3307:3306"

    env_file:
      - .env

    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}

    volumes:
      - mysql_data:/var/lib/mysql

    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10

    command: --default-authentication-plugin=mysql_native_password

  redis:
    image: redis:7
    container_name: toutiao_redis
    restart: always

    ports:
      - "6379:6379"

    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mysql_data: